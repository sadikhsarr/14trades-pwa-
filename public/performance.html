<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>14 Trades · Performance</title>
<link rel="stylesheet" href="/style.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1C1C1E;font-family:'Inter',sans-serif;color:#F5F5F0;width:100%;margin:0;padding:0}body{min-height:100vh;padding-bottom:40px}
.perf-hdr{padding:16px 18px 12px;padding-top:calc(env(safe-area-inset-top) + 16px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #3A3A3C;background:#1C1C1E;position:sticky;top:0;z-index:100;width:100%}
.back-btn{font-size:13px;color:#636366;cursor:pointer;padding:6px 10px;border-radius:8px;background:#2C2C2E;border:1px solid #3A3A3C}
.perf-title{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#FFD700}
.main{padding:14px 16px;display:flex;flex-direction:column;gap:10px}
.sec-lbl{font-size:8px;font-weight:700;color:#636366;letter-spacing:1.5px;text-transform:uppercase}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.stat-card{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px}
.stat-val{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.stat-lbl{font-size:8px;color:#636366;letter-spacing:.5px;text-transform:uppercase}
.win-card{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:14px;width:100%}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-row:last-child{margin-bottom:0}
.bar-name{font-size:9px;color:#888;width:44px;flex-shrink:0}
.bar-track{flex:1;height:4px;background:#1A1A1A;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width 1s ease}
.bar-pct{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;width:28px;text-align:right}
.sep{height:1px;background:#3A3A3C}
.asset-card{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px}
.sig-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #1A1A1A}
.sig-item:last-child{border-bottom:none}
.sig-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sig-body{flex:1}
.sig-asset{font-size:11px;font-weight:600;color:#F0F0F0}
.sig-meta{font-size:8px;color:#636366;margin-top:2px}
.sig-res{font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px}
.sig-res.win{background:#30D15815;color:#30D158;border:1px solid #30D15825}
.sig-res.loss{background:#FF453A15;color:#FF453A;border:1px solid #FF453A25}
.months{display:flex;gap:6px;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:10px;padding:4px}
.month-btn{flex:1;text-align:center;padding:6px 4px;border-radius:7px;font-size:9px;font-weight:600;color:#636366;cursor:pointer;transition:all .2s;border:none;background:none}
.month-btn.active{background:#FFD70015;color:#FFD700;border:1px solid #FFD70020}
.loading{text-align:center;color:#636366;font-size:12px;padding:20px}
</style>
</head>
<body>
<div class="perf-hdr">
  <button class="back-btn" onclick="history.back()">← Back</button>
  <div class="perf-title">Performance</div>
  <div style="width:60px"></div>
</div>

<div class="main">
  <div class="months">
    <button class="month-btn active" onclick="filterMonth('all',this)">All time</button>
    <button class="month-btn" onclick="filterMonth('month',this)">This month</button>
    <button class="month-btn" onclick="filterMonth('week',this)">This week</button>
  </div>

  <div class="stat-grid">
    <div class="stat-card"><div class="stat-val" id="p-wr" style="color:#30D158">--%</div><div class="stat-lbl">Win rate</div></div>
    <div class="stat-card"><div class="stat-val" id="p-pnl" style="color:#FFD700">+$0</div><div class="stat-lbl">P&L / lot</div></div>
    <div class="stat-card"><div class="stat-val" id="p-sigs" style="color:#FFD700">0</div><div class="stat-lbl">Signals</div></div>
    <div class="stat-card"><div class="stat-val" id="p-streak" style="color:#30D158">0</div><div class="stat-lbl">Best streak</div></div>
  </div>

  <div class="win-card">
    <svg width="56" height="56" viewBox="0 0 56 56" id="win-svg">
      <circle cx="28" cy="28" r="22" fill="none" stroke="#1A1A1A" stroke-width="5"/>
      <circle cx="28" cy="28" r="22" fill="none" stroke="#30D158" stroke-width="5"
        id="win-arc" stroke-dasharray="138" stroke-dashoffset="30"
        stroke-linecap="round" transform="rotate(-90 28 28)"/>
      <text x="28" y="33" text-anchor="middle" fill="#F0F0F0"
        font-size="12" font-family="Space Mono" font-weight="700" id="win-txt">--%</text>
    </svg>
    <div style="flex:1">
      <div class="bar-row"><div class="bar-name" style="color:#30D158">Wins</div><div class="bar-track"><div class="bar-fill" id="bar-wins" style="width:0%;background:#30D158"></div></div><div class="bar-pct" id="num-wins" style="color:#30D158">0</div></div>
      <div class="bar-row"><div class="bar-name" style="color:#FF453A">Losses</div><div class="bar-track"><div class="bar-fill" id="bar-loss" style="width:0%;background:#FF453A"></div></div><div class="bar-pct" id="num-loss" style="color:#FF453A">0</div></div>
      <div class="bar-row"><div class="bar-name" style="color:#636366">Total</div><div class="bar-track"><div class="bar-fill" id="bar-total" style="width:100%;background:#636366"></div></div><div class="bar-pct" id="num-total" style="color:#636366">0</div></div>
    </div>
  </div>

  <div class="sec-lbl">By asset</div>
  <div class="asset-card" id="asset-bars">
    <div class="loading">Loading...</div>
  </div>

  <div class="sec-lbl">Recent signals</div>
  <div style="background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px">
    <div id="sig-list"><div class="loading">Loading...</div></div>
  </div>
</div>

<script>
const SERVER = 'https://14trades-server-production.up.railway.app';
let allSignals = [];
let currentFilter = 'all';

async function loadPerformance() {
  try {
    const res = await fetch(SERVER + '/api/state');
    const d   = await res.json();
    allSignals = (d.signals || []).filter(s => s.type && (s.type.includes('tp') || s.type.includes('sl')));
    render();
  } catch(e) {
    document.getElementById('sig-list').innerHTML = '<div class="loading">Could not load data</div>';
  }
}

function filterMonth(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const now = Date.now();
  let sigs = allSignals;
  if (currentFilter === 'month') sigs = sigs.filter(s => now - new Date(s.timestamp).getTime() < 30*24*60*60*1000);
  if (currentFilter === 'week')  sigs = sigs.filter(s => now - new Date(s.timestamp).getTime() < 7*24*60*60*1000);

  const wins   = sigs.filter(s => !s.type.includes('sl')).length;
  const losses = sigs.filter(s => s.type.includes('sl')).length;
  const total  = wins + losses;
  const wr     = total > 0 ? Math.round((wins/total)*100) : 0;
  const pnl    = wins * 150 - losses * 100;

  // Update stats
  document.getElementById('p-wr').textContent    = total > 0 ? wr + '%' : '--%';
  document.getElementById('p-pnl').textContent   = pnl >= 0 ? '+$' + pnl : '-$' + Math.abs(pnl);
  document.getElementById('p-sigs').textContent  = total;

  // Streak
  let streak = 0, best = 0, cur = 0;
  [...sigs].reverse().forEach(s => {
    if (!s.type.includes('sl')) { cur++; best = Math.max(best, cur); }
    else cur = 0;
  });
  document.getElementById('p-streak').textContent = best;

  // Ring
  const arc = document.getElementById('win-arc');
  const offset = total > 0 ? 138 - (138 * wr / 100) : 138;
  if (arc) arc.setAttribute('stroke-dashoffset', offset);
  document.getElementById('win-txt').textContent = total > 0 ? wr + '%' : '--%';
  document.getElementById('bar-wins').style.width  = total > 0 ? wr + '%' : '0%';
  document.getElementById('bar-loss').style.width  = total > 0 ? (100-wr) + '%' : '0%';
  document.getElementById('num-wins').textContent  = wins;
  document.getElementById('num-loss').textContent  = losses;
  document.getElementById('num-total').textContent = total;

  // Asset bars
  const assets = {};
  sigs.forEach(s => {
    const a = (s.asset || 'GOLD').toUpperCase();
    if (!assets[a]) assets[a] = {w:0,l:0};
    if (s.type.includes('sl')) assets[a].l++; else assets[a].w++;
  });
  const colors = {GOLD:'#FFD700',BTC:'#F0921A',SILVER:'#C0C0C0',NAS100:'#4A9EFF',US30:'#BF5AF2'};
  const assetEl = document.getElementById('asset-bars');
  if (Object.keys(assets).length === 0) {
    assetEl.innerHTML = '<div class="loading">No signals yet</div>';
  } else {
    assetEl.innerHTML = Object.entries(assets).map(([name, s]) => {
      const r = s.w + s.l > 0 ? Math.round((s.w/(s.w+s.l))*100) : 0;
      const c = colors[name] || '#888';
      return `<div class="bar-row">
        <div class="bar-name" style="color:${c}">${name}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${r}%;background:${c}"></div></div>
        <div class="bar-pct" style="color:${c}">${r}%</div>
      </div>`;
    }).join('');
  }

  // Signal list
  const sigEl = document.getElementById('sig-list');
  if (sigs.length === 0) {
    sigEl.innerHTML = '<div class="loading">No signals yet</div>';
  } else {
    sigEl.innerHTML = [...sigs].reverse().slice(0,20).map(s => {
      const isWin = !s.type.includes('sl');
      const ts    = new Date(s.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'});
      const label = isWin ? ('TP' + (s.level||'') + ' ✓') : 'SL';
      return `<div class="sig-item">
        <div class="sig-dot" style="background:${isWin?'#30D158':'#FF453A'}"></div>
        <div class="sig-body">
          <div class="sig-asset">${(s.asset||'GOLD').toUpperCase()} · ${s.direction||''}</div>
          <div class="sig-meta">${ts}</div>
        </div>
        <div class="sig-res ${isWin?'win':'loss'}">${label}</div>
      </div>`;
    }).join('');
  }
}

loadPerformance();
</script>
</body>
</html>
