<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1C1C1E">
<title>14 Trades · Performance</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#1C1C1E;color:#F5F5F0;font-family:'Inter',sans-serif;min-height:100vh;width:100vw;max-width:100vw;overflow-x:hidden}
body{padding-bottom:40px}

.hdr{
  background:#1C1C1E;
  border-bottom:1px solid #3A3A3C;
  padding:16px 18px 12px;
  padding-top:calc(env(safe-area-inset-top) + 16px);
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;top:0;z-index:100;
  width:100%
}
.back{
  background:#2C2C2E;border:1px solid #3A3A3C;border-radius:8px;
  padding:7px 14px;font-size:13px;color:#F5F5F0;cursor:pointer;
  font-family:'Inter',sans-serif
}
.title{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#FFD700}

.main{padding:14px 16px;display:flex;flex-direction:column;gap:10px;width:100%}

.months{display:flex;gap:5px;background:#2C2C2E;border:1px solid #3A3A3C;border-radius:10px;padding:4px}
.mb{flex:1;text-align:center;padding:6px 4px;border-radius:7px;font-size:10px;font-weight:600;color:#636366;cursor:pointer;border:none;background:none;font-family:'Inter',sans-serif;transition:all .2s}
.mb.active{background:#FFD70015;color:#FFD700;border:1px solid #FFD70020}

.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sc{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px}
.sv{font-family:'Space Mono',monospace;font-size:22px;font-weight:700;line-height:1;margin-bottom:3px}
.sl{font-size:8px;color:#636366;letter-spacing:.5px;text-transform:uppercase}

.wcard{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:14px}
.brow{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.brow:last-child{margin-bottom:0}
.bname{font-size:9px;color:#888;width:48px;flex-shrink:0}
.btrack{flex:1;height:4px;background:#1A1A1A;border-radius:2px;overflow:hidden}
.bfill{height:100%;border-radius:2px;transition:width 1s ease}
.bpct{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;width:28px;text-align:right}

.sec{font-size:8px;font-weight:700;color:#636366;letter-spacing:1.5px;text-transform:uppercase}
.sep{height:1px;background:#3A3A3C}
.acard{background:#2C2C2E;border:1px solid #3A3A3C;border-radius:12px;padding:12px 14px}

.sitem{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #2A2A2A}
.sitem:last-child{border-bottom:none}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sbody{flex:1}
.sasset{font-size:11px;font-weight:600;color:#F0F0F0}
.smeta{font-size:8px;color:#636366;margin-top:2px}
.sres{font-size:10px;font-weight:700;padding:3px 9px;border-radius:6px}
.sres.win{background:#30D15815;color:#30D158;border:1px solid #30D15825}
.sres.loss{background:#FF453A15;color:#FF453A;border:1px solid #FF453A25}
.loading{text-align:center;color:#636366;font-size:12px;padding:20px}
</style>
</head>
<body>

<div class="hdr">
  <button class="back" onclick="history.back()">← Back</button>
  <div class="title">Performance</div>
  <div style="width:70px"></div>
</div>

<div class="main">

  <div class="months">
    <button class="mb active" onclick="setFilter('all',this)">All time</button>
    <button class="mb" onclick="setFilter('month',this)">This month</button>
    <button class="mb" onclick="setFilter('week',this)">This week</button>
  </div>

  <div class="sgrid">
    <div class="sc"><div class="sv" id="p-wr" style="color:#30D158">--%</div><div class="sl">Win rate</div></div>
    <div class="sc"><div class="sv" id="p-pnl" style="color:#FFD700">--</div><div class="sl">P&L / lot</div></div>
    <div class="sc"><div class="sv" id="p-sigs" style="color:#FFD700">--</div><div class="sl">Signals</div></div>
    <div class="sc"><div class="sv" id="p-streak" style="color:#30D158">--</div><div class="sl">Best streak</div></div>
  </div>

  <div class="wcard">
    <svg width="60" height="60" viewBox="0 0 60 60" style="flex-shrink:0">
      <circle cx="30" cy="30" r="24" fill="none" stroke="#2A2A2A" stroke-width="5"/>
      <circle cx="30" cy="30" r="24" fill="none" stroke="#30D158" stroke-width="5"
        id="w-arc" stroke-dasharray="150" stroke-dashoffset="150"
        stroke-linecap="round" transform="rotate(-90 30 30)"/>
      <text x="30" y="35" text-anchor="middle" fill="#F5F5F0"
        font-size="12" font-family="Space Mono" font-weight="700" id="w-txt">--%</text>
    </svg>
    <div style="flex:1">
      <div class="brow">
        <div class="bname" style="color:#30D158">Wins</div>
        <div class="btrack"><div class="bfill" id="b-w" style="width:0%;background:#30D158"></div></div>
        <div class="bpct" id="n-w" style="color:#30D158">0</div>
      </div>
      <div class="brow">
        <div class="bname" style="color:#FF453A">Losses</div>
        <div class="btrack"><div class="bfill" id="b-l" style="width:0%;background:#FF453A"></div></div>
        <div class="bpct" id="n-l" style="color:#FF453A">0</div>
      </div>
      <div class="brow">
        <div class="bname" style="color:#636366">Total</div>
        <div class="btrack"><div class="bfill" id="b-t" style="width:100%;background:#3A3A3C"></div></div>
        <div class="bpct" id="n-t" style="color:#636366">0</div>
      </div>
    </div>
  </div>

  <div class="sec">By asset</div>
  <div class="acard" id="asset-bars"><div class="loading">Loading...</div></div>

  <div class="sec">Recent signals</div>
  <div class="acard" id="sig-list"><div class="loading">Loading...</div></div>

</div>

<script>
const SERVER = 'https://14trades-server-production.up.railway.app';
let all = [];
let filter = 'all';

async function load() {
  try {
    const r = await fetch(SERVER + '/api/state');
    const d = await r.json();
    all = (d.signals || []).filter(s => s.type && (s.type.includes('tp') || s.type.includes('sl')));
    render();
  } catch(e) {
    document.getElementById('sig-list').innerHTML = '<div class="loading">Could not load</div>';
  }
}

function setFilter(f, btn) {
  filter = f;
  document.querySelectorAll('.mb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  const now = Date.now();
  let sigs = all;
  if (filter === 'month') sigs = sigs.filter(s => now - new Date(s.timestamp) < 30*864e5);
  if (filter === 'week')  sigs = sigs.filter(s => now - new Date(s.timestamp) < 7*864e5);

  const wins   = sigs.filter(s => !s.type.includes('sl')).length;
  const losses = sigs.filter(s => s.type.includes('sl')).length;
  const total  = wins + losses;
  const wr     = total > 0 ? Math.round(wins/total*100) : 0;
  const pnl    = wins*150 - losses*100;

  document.getElementById('p-wr').textContent    = total > 0 ? wr+'%' : '--%';
  document.getElementById('p-pnl').textContent   = total > 0 ? (pnl>=0?'+':'') + '$'+Math.abs(pnl) : '--';
  document.getElementById('p-sigs').textContent  = total || '--';
  let best=0,cur=0;
  [...sigs].reverse().forEach(s=>{ if(!s.type.includes('sl')){cur++;best=Math.max(best,cur);}else cur=0; });
  document.getElementById('p-streak').textContent = best || '--';

  const arc = document.getElementById('w-arc');
  arc.setAttribute('stroke-dashoffset', total>0 ? 150-(150*wr/100) : 150);
  document.getElementById('w-txt').textContent = total>0 ? wr+'%' : '--%';
  document.getElementById('b-w').style.width = total>0 ? wr+'%' : '0%';
  document.getElementById('b-l').style.width = total>0 ? (100-wr)+'%' : '0%';
  document.getElementById('n-w').textContent = wins;
  document.getElementById('n-l').textContent = losses;
  document.getElementById('n-t').textContent = total;

  const colors={GOLD:'#FFD700',BTC:'#F0921A',SILVER:'#C0C0C0',NAS100:'#4A9EFF',US30:'#BF5AF2'};
  const assets={};
  sigs.forEach(s=>{ const a=(s.asset||'GOLD').toUpperCase(); if(!assets[a])assets[a]={w:0,l:0}; s.type.includes('sl')?assets[a].l++:assets[a].w++; });
  const ae = document.getElementById('asset-bars');
  if (!Object.keys(assets).length) { ae.innerHTML='<div class="loading">No signals yet</div>'; }
  else ae.innerHTML = Object.entries(assets).map(([name,s])=>{
    const r=s.w+s.l>0?Math.round(s.w/(s.w+s.l)*100):0;
    const c=colors[name]||'#888';
    return `<div class="brow"><div class="bname" style="color:${c}">${name}</div><div class="btrack"><div class="bfill" style="width:${r}%;background:${c}"></div></div><div class="bpct" style="color:${c}">${r}%</div></div>`;
  }).join('');

  const se = document.getElementById('sig-list');
  if (!sigs.length) { se.innerHTML='<div class="loading">No signals yet</div>'; return; }
  se.innerHTML = [...sigs].reverse().slice(0,20).map(s=>{
    const isWin=!s.type.includes('sl');
    const ts=new Date(s.timestamp).toLocaleDateString('en-US',{month:'short',day:'numeric'});
    const lbl=isWin?'TP'+(s.level||'3')+' ✓':'SL Hit';
    return `<div class="sitem">
      <div class="sdot" style="background:${isWin?'#30D158':'#FF453A'}"></div>
      <div class="sbody"><div class="sasset">${(s.asset||'GOLD').toUpperCase()} · ${s.direction||''}</div><div class="smeta">${ts}</div></div>
      <div class="sres ${isWin?'win':'loss'}">${lbl}</div>
    </div>`;
  }).join('');
}

load();
</script>
</body>
</html>
