<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#C9A84C">
<title>14 Trades — Access</title>
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0C0C0C;--s1:#131313;--s2:#1A1A1A;--border:#222;--gold:#C9A84C;--gold2:#E8C96A;--white:#F0F0F0;--muted:#555;--green:#00C87A;--red:#FF3B4E}
html,body{height:100%;background:var(--bg);font-family:'Inter',sans-serif;color:var(--white);-webkit-font-smoothing:antialiased}
body{display:flex;justify-content:center;align-items:center;padding:24px;min-height:100vh}

.screen{width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:32px;padding:20px 0}

/* BG */
.bg-glow{position:fixed;top:-80px;left:50%;transform:translateX(-50%);width:300px;height:300px;background:radial-gradient(ellipse,#C9A84C12 0%,transparent 70%);pointer-events:none;z-index:0}
.bg-lines{position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 40px,#C9A84C03 40px,#C9A84C03 41px);pointer-events:none;z-index:0}

/* LOGO */
.logo-wrap{display:flex;flex-direction:column;align-items:center;gap:5px;z-index:1}
.logo-ring{width:80px;height:80px;border-radius:50%;background:#0F0C00;border:1px solid #C9A84C20;display:flex;align-items:center;justify-content:center;position:relative}
.spin-ring{position:absolute;inset:-2px;border-radius:50%;border:2px solid transparent;border-top-color:#C9A84C;border-right-color:#C9A84C50;animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.logo-txt{font-family:'Space Mono',monospace;font-size:24px;font-weight:700;color:var(--gold);z-index:1}
.logo-txt span{color:var(--gold2)}
.brand-name{font-size:11px;font-weight:700;letter-spacing:4px;color:var(--white);text-transform:uppercase}
.brand-sub{font-size:8px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}

/* FORM */
.form-wrap{width:100%;display:flex;flex-direction:column;gap:14px;z-index:1}
.divider-line{display:flex;align-items:center;gap:10px;margin-bottom:2px}
.dl{flex:1;height:1px;background:linear-gradient(90deg,transparent,#C9A84C20)}
.dr{flex:1;height:1px;background:linear-gradient(270deg,transparent,#C9A84C20)}
.dc{width:3px;height:3px;border-radius:50%;background:var(--gold);opacity:.4}
.form-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:-8px}
.form-input{width:100%;background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:16px 18px;font-family:'Inter',sans-serif;font-size:14px;color:var(--white);outline:none;transition:all .3s;-webkit-appearance:none}
.form-input:focus{border-color:#C9A84C40;background:#0C0B00;box-shadow:0 0 0 2px #C9A84C10}
.form-input::placeholder{color:#333}
.form-input.error{border-color:#FF3B4E50;background:#100505}
.form-input.success{border-color:#00C87A50;background:#001A0F}
.code-input{font-family:'Space Mono',monospace;font-size:20px;font-weight:700;letter-spacing:6px;text-align:center;text-transform:uppercase}

.access-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold2));border:none;border-radius:14px;padding:18px;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:#000;cursor:pointer;letter-spacing:1.5px;transition:all .2s;position:relative;overflow:hidden;z-index:1}
.access-btn:active{transform:scale(.97)}
.access-btn:disabled{opacity:.4;cursor:default;transform:none}
.btn-shine{position:absolute;top:0;left:-100%;width:50%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.25),transparent);animation:shimmer 3s ease infinite}
@keyframes shimmer{0%{left:-100%}100%{left:200%}}

.error-msg{font-size:11px;color:var(--red);text-align:center;min-height:16px}
.success-msg{font-size:11px;color:var(--green);text-align:center;min-height:16px}

.bottom{display:flex;flex-direction:column;align-items:center;gap:8px;z-index:1}
.tagline{font-size:10px;color:#2A2A2A;text-align:center;line-height:1.8}
.tagline strong{color:#3A3A3A}
.lang-row{display:flex;gap:6px}
.lp{padding:4px 12px;border-radius:16px;font-size:9px;font-weight:700;cursor:pointer;border:1px solid #222;background:none;color:#444;font-family:'Inter',sans-serif;transition:all .2s}
.lp.active{background:#C9A84C15;color:var(--gold);border-color:#C9A84C30}

/* STARS */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:var(--gold);animation:twinkle var(--d) ease infinite var(--delay)}
@keyframes twinkle{0%,100%{opacity:0}50%{opacity:.35}}
</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-lines"></div>
<div class="stars" id="stars"></div>

<div class="screen">
  <div class="logo-wrap">
    <div class="logo-ring">
      <div class="spin-ring"></div>
      <div class="logo-txt">14<span>⚡</span></div>
    </div>
    <div class="brand-name">Trades</div>
    <div class="brand-sub">Alert · Premium</div>
  </div>

  <div class="form-wrap">
    <div class="divider-line"><div class="dl"></div><div class="dc"></div><div class="dr"></div></div>

    <div class="form-label" id="lbl-email">Your email</div>
    <input class="form-input" id="email-input" type="email" placeholder="you@example.com" autocomplete="email" oninput="clearErrors()">

    <div class="form-label" id="lbl-code">Access code</div>
    <input class="form-input code-input" id="code-input" type="text" maxlength="9" placeholder="· · · · - · · · ·" autocomplete="off" autocorrect="off" spellcheck="false" oninput="this.value=this.value.toUpperCase();clearErrors()" onkeydown="if(event.key==='Enter')submitAccess()">

    <button class="access-btn" id="access-btn" onclick="submitAccess()">
      ACCESS ⚡
      <div class="btn-shine"></div>
    </button>
    <div class="error-msg" id="error-msg"></div>
    <div class="success-msg" id="success-msg"></div>
  </div>

  <div class="bottom">
    <div class="tagline"><strong>Gold · BTC · Nasdaq</strong><br>Premium signals · Real-time alerts</div>
    <div class="lang-row">
      <button class="lp active" id="lang-en" onclick="setLang('en')">EN</button>
      <button class="lp" id="lang-fr" onclick="setLang('fr')">FR</button>
    </div>
  </div>
</div>

<script>
const SERVER = 'https://14trades-server-production.up.railway.app';
let lang = localStorage.getItem('14t_lang') || 'en';

const LABELS = {
  en: { email:'Your email', code:'Access code', btn:'ACCESS ⚡', err_invalid:'Invalid code — contact us to subscribe', err_used:'Code already used on another device', err_email:'Please enter a valid email', err_expired:'Code expired — contact us to renew', loading:'VERIFYING...', success:'Welcome! Loading your signals...' },
  fr: { email:'Votre email', code:"Code d'accès", btn:'ACCÉDER ⚡', err_invalid:'Code invalide — contactez-nous pour vous abonner', err_used:'Code déjà utilisé sur un autre appareil', err_email:'Entrez un email valide', err_expired:'Code expiré — contactez-nous pour renouveler', loading:'VÉRIFICATION...', success:'Bienvenue! Chargement de vos signaux...' }
};

function setLang(l) {
  lang = l;
  localStorage.setItem('14t_lang', l);
  document.getElementById('lbl-email').textContent  = LABELS[l].email;
  document.getElementById('lbl-code').textContent   = LABELS[l].code;
  document.getElementById('access-btn').childNodes[0].textContent = LABELS[l].btn + ' ';
  document.getElementById('lang-en').classList.toggle('active', l==='en');
  document.getElementById('lang-fr').classList.toggle('active', l==='fr');
}

function clearErrors() {
  document.getElementById('error-msg').textContent   = '';
  document.getElementById('success-msg').textContent = '';
  document.getElementById('email-input').classList.remove('error');
  document.getElementById('code-input').classList.remove('error');
}

// Generate device fingerprint
function getDeviceId() {
  let id = localStorage.getItem('14t_device_id');
  if (!id) {
    id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2,9);
    localStorage.setItem('14t_device_id', id);
  }
  return id;
}

async function submitAccess() {
  const email   = document.getElementById('email-input').value.trim().toLowerCase();
  const code    = document.getElementById('code-input').value.trim().toUpperCase();
  const btn     = document.getElementById('access-btn');
  const errEl   = document.getElementById('error-msg');
  const succEl  = document.getElementById('success-msg');
  const L       = LABELS[lang];

  // Validate
  if (!email || !email.includes('@')) {
    document.getElementById('email-input').classList.add('error');
    errEl.textContent = L.err_email;
    return;
  }
  if (!code || code.length < 4) {
    document.getElementById('code-input').classList.add('error');
    errEl.textContent = L.err_invalid;
    return;
  }

  btn.disabled = true;
  btn.childNodes[0].textContent = L.loading + ' ';

  try {
    const res = await fetch(`${SERVER}/api/activate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, code, deviceId: getDeviceId() })
    });
    const d = await res.json();

    if (d.ok) {
      document.getElementById('email-input').classList.add('success');
      document.getElementById('code-input').classList.add('success');
      succEl.textContent = L.success;
      // Save session
      localStorage.setItem('14t_access',     code);
      localStorage.setItem('14t_email',      email);
      localStorage.setItem('14t_join',       d.joinDate || new Date().toISOString());
      // Save as timestamp number — convert date string if needed
      const expTs = d.expiresAt ? new Date(d.expiresAt).getTime() : Date.now() + 30*24*60*60*1000;
      localStorage.setItem('14t_access_exp', expTs.toString());
      // Redirect to app after short delay
      setTimeout(() => { window.location.href = '/'; }, 1200);
    } else {
      const errMap = { invalid: L.err_invalid, used: L.err_used, expired: L.err_expired };
      errEl.textContent = errMap[d.reason] || L.err_invalid;
      document.getElementById('code-input').classList.add('error');
      btn.disabled = false;
      btn.childNodes[0].textContent = L.btn + ' ';
    }
  } catch(e) {
    errEl.textContent = 'Connection error — try again';
    btn.disabled = false;
    btn.childNodes[0].textContent = L.btn + ' ';
  }
}

// Stars
const sc = document.getElementById('stars');
for(let i=0;i<16;i++){
  const s=document.createElement('div');
  s.className='star';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${2+Math.random()*4}s;--delay:${Math.random()*4}s`;
  sc.appendChild(s);
}

// Set initial lang
setLang(lang);

// Check if already has valid access
const saved = localStorage.getItem('14t_access');
const exp   = parseInt(localStorage.getItem('14t_access_exp') || '0');
if (saved && exp > Date.now()) window.location.href = '/';
</script>
</body>
</html>
