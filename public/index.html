<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="14 Trades">
<meta name="theme-color" content="#C9A84C">
<title>14 Trades Alert</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="/style.css"> 
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
<script>
  window.OneSignalDeferred = window.OneSignalDeferred || [];
  OneSignalDeferred.push(async function(OneSignal) {
    await OneSignal.init({
      appId: "534e2f6f-66fe-4d3d-904f-e86e603b904b",
    });
  });
</script>
</head>
<body>

<div id="install-banner" class="install-banner" style="display:none">
  <div class="ib-text">
    <strong>Add to Home Screen</strong>
    <span>for the best experience</span>
  </div>
  <button class="ib-btn" onclick="dismissInstall()">✕</button>
</div>

<div class="phone">

  <div class="header">
    <div class="logo-col">
      <div class="logo-row"><span class="logo-num">14</span><span class="logo-bolt">⚡</span></div>
      <div class="logo-trades">TRADES</div>
      <div class="logo-sub">ALERT</div>
    </div>
    <div class="header-right">
      <div class="dot-live" id="dot-live"></div>
      <button class="notif-btn" id="notif-btn" onclick="requestPush()">
        <i class="ti ti-bell"></i>
      </button>
    </div>
  </div>

  <div class="main" id="main-content">

    <!-- PREP / COUNTDOWN -->
    <div class="prep-block" id="prep-block">
      <div class="prep-label">Next signal · Gold</div>
      <div class="dir-pill waiting" id="dir-pill">
        <div class="dir-dot"></div>
        <span id="dir-text">Waiting</span>
      </div>
      <div class="countdown waiting" id="countdown">--:--</div>
      <div class="prep-sub" id="prep-sub">Stand by</div>
    </div>

    <div class="divider"></div>

    <!-- LIVE TRADE CARD -->
    <div class="live-block" id="live-block" style="display:none">
      <div class="live-top">
        <div class="live-tag"><div class="blink green-dot"></div>Live trade</div>
        <div class="live-asset" id="live-asset">GOLD</div>
      </div>
      <div class="live-mid">
        <div class="live-dir" id="live-dir">BUY</div>
        <div class="live-pnl">
          <div class="pnl-val" id="pnl-val">+$0</div>
          <div class="pnl-lbl" id="pnl-lbl">running</div>
        </div>
      </div>
      <div class="prog-wrap">
        <div class="prog-fill" id="prog-fill" style="width:5%"></div>
        <div class="prog-cursor" id="prog-cursor" style="left:5%"></div>
      </div>
      <div class="levels-wrap">
        <div class="sl-row" id="sl-row">
          <div class="sl-shine"></div>
          <div class="sl-left">
            <div class="sl-dot"></div>
            <div class="sl-label">Stop Loss</div>
            <div class="sl-hit-lbl" id="sl-hit-lbl">Hit</div>
          </div>
          <div class="sl-right">
            <div class="sl-price" id="sl-price">—</div>
            <div class="sl-x" id="sl-x"><i class="ti ti-x"></i></div>
          </div>
        </div>
        <div class="tp-row" id="tp1">
          <div class="tp-shine"></div>
          <div class="tp-left"><div class="tp-num">TP 1</div><div class="hit-lbl">Hit</div></div>
          <div class="tp-right"><div class="tp-pts">+10 pts</div><div class="tp-price" id="tp1-price">—</div><div class="tp-check"><i class="ti ti-check"></i></div></div>
        </div>
        <div class="tp-row" id="tp2">
          <div class="tp-shine"></div>
          <div class="tp-left"><div class="tp-num">TP 2</div><div class="hit-lbl">Hit</div></div>
          <div class="tp-right"><div class="tp-pts">+15 pts</div><div class="tp-price" id="tp2-price">—</div><div class="tp-check"><i class="ti ti-check"></i></div></div>
        </div>
        <div class="tp-row" id="tp3">
          <div class="tp-shine"></div>
          <div class="tp-left"><div class="tp-num">TP 3</div><div class="hit-lbl">Hit</div></div>
          <div class="tp-right"><div class="tp-pts">+20 pts</div><div class="tp-price" id="tp3-price">—</div><div class="tp-check"><i class="ti ti-check"></i></div></div>
        </div>
      </div>
    </div>

    <!-- NO TRADE PLACEHOLDER -->
    <div class="no-trade" id="no-trade">
      <i class="ti ti-chart-candle" style="font-size:32px;color:var(--muted)"></i>
      <div class="no-trade-text">No active trade</div>
      <div class="no-trade-sub">Signal will appear here</div>
    </div>

    <div class="divider"></div>

    <!-- HISTORY -->
    <div class="hist-block">
      <div class="hist-title">History</div>
      <div id="hist-feed"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script src="/app.js"></script>
</body>
</html>
